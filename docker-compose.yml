services:
  db:
    build: ./docker/postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Одноразовая инициализация: создаёт бакет MinIO, если его ещё нет.
  # Нужна, потому что бакет не создаётся сам при первом старте MinIO
  # (в отличие от Postgres, который накатывает init.sql) — без этого шага
  # любая загрузка файла падает с NoSuchBucket на свежем volume.
  minio-init:
    image: minio/mc:latest
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
    depends_on:
      minio:
        condition: service_healthy

  # Dev-почта: перехватывает всё, что шлёт backend/celery по SMTP, наружу
  # ничего не уходит. Веб-интерфейс писем — localhost:8025 (architecture.md §2).
  # Без volume (вариант A, решение пользователя) — письма живут в памяти
  # контейнера, обнуляются на каждый restart/пересборку: это одноразовый
  # dev-инструмент, не источник истины, копить историю тестовых писем не нужно.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  celery-worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A config beat -l info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
